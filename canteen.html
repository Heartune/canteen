        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fff5f0 0%, #ffe5e5 50%, #fff9e5 100%);
            min-height: 100vh;
        }

        .header {
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 30px;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .canteen-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .canteen-tab {
            padding: 12px 24px;
            border-radius: 25px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            background: #f5f5f5;
            color: #666;
            transition: all 0.3s ease;
        }

        .canteen-tab:hover {
            background: #e8e8e8;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .canteen-tab.active {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
            transform: scale(1.05);
        }

        @media screen and (max-width: 768px) {
            .section {
                padding: 13px;
            }

            .canteen-tabs {
                gap: 8px;
            }

            .canteen-tab {
                padding: 10px 18px;
                font-size: 12px;
                min-height: 40px;
                min-width: 60px;
            }

            @media screen and (max-width: 480px) {
                .canteen-tab {
                    padding: 8px 14px;
                    font-size: 10px;
                    margin: 0 4px;
                }

                .canteen-tabs {
                    gap: 4px;
                }
            }
        }

        .hours-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .hour-card {
            background: linear-gradient(135deg, #fff9e5 0%, #ffe5cc 100%);
            border: 2px solid #ffcc99;
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s ease;
        }

        .hour-card:nth-child(2) {
            background: linear-gradient(135deg, #ffe5e5 0%, #ffccdd 100%);
            border-color: #ffb3cc;
        }

        .hour-card:nth-child(3) {
            background: linear-gradient(135deg, #f0e5ff 0%, #e5ccff 100%);
            border-color: #cc99ff;
        }

        .hour-card:hover {
            transform: translateY(-5px);
        }

        .hour-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .hour-time {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .dishes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .dish-card {
            position: relative;
            background: linear-gradient(135deg, #ffffff 0%, #f9f9f9 100%);
            border: 2px solid #e8e8e8;
            border-radius: 15px;
            padding: 24px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .dish-card:hover {
            border-color: #ff6b35;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transform: translateY(-5px);
        }

        .dish-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .dish-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .dish-window {
            display: inline-block;
            font-size: 13px;
            color: #666;
            background: linear-gradient(135deg, #f0f0f0 0%, #e8e8e8 100%);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 500;
        }

        .new-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: linear-gradient(135deg, #ff4757 0%, #ff6b9d 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .sparkle {
            display: inline-block;
            animation: sparkle 1.5s infinite;
        }

        @keyframes sparkle {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(1.2);
            }
        }

        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .dishes-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
            }

            .container {
                padding: 15px 15px;
            }
        }
    </style>
</head>

        var selectedCanteen = 0;

        function init() {
            renderCanteenTabs();
            renderContent();
        }

        function renderCanteenTabs() {
            var tabsContainer = document.getElementById('canteenTabs');
            tabsContainer.innerHTML = '';

            for (var i = 0; i < canteens.length; i++) {
                var canteen = canteens[i];
                var tab = document.createElement('button');
                tab.className = 'canteen-tab';
                if (i === selectedCanteen) {
                    tab.className += ' active';
                }
                tab.textContent = canteen.name;
                tab.setAttribute('data-index', i);
                tab.onclick = function () {
                    selectedCanteen = parseInt(this.getAttribute('data-index'));
                    renderCanteenTabs();
                    renderContent();
                };
                tabsContainer.appendChild(tab);
            }
        }

        function renderContent() {
            var canteen = canteens[selectedCanteen];

            var hoursGrid = document.getElementById('hoursGrid');
            hoursGrid.innerHTML =
                '<div class="hour-card">' +
                '<div class="hour-label">🌅 早餐</div>' +
                '<div class="hour-time">' + canteen.hours.breakfast + '</div>' +
                '</div>' +
                '<div class="hour-card">' +
                '<div class="hour-label">☀️ 午餐</div>' +
                '<div class="hour-time">' + canteen.hours.lunch + '</div>' +
                '</div>' +
                '<div class="hour-card">' +
                '<div class="hour-label">🌙 晚餐</div>' +
                '<div class="hour-time">' + canteen.hours.dinner.replace(/\n/g, '<br>') + '</div>' +
                '</div>';

            var dishesGrid = document.getElementById('dishesGrid');
            dishesGrid.innerHTML = '';

            for (var j = 0; j < canteen.dishes.length; j++) {
                var dish = canteen.dishes[j];
                var dishCard = document.createElement('div');
                dishCard.className = 'dish-card';

                var newBadgeHtml = '';
                if (dish.isNew) {
                    newBadgeHtml = '<div class="new-badge"><span class="sparkle">✨</span>新品</div>';
                }
                if (dish.window) {
                    dishCard.innerHTML = newBadgeHtml +
                        '<div class="dish-icon">🍽️</div>' +
                        '<div class="dish-name">' + dish.name + '</div>' +
                        '<div class="dish-window">' + dish.window + '</div>';
                } else {
                    dishCard.innerHTML = newBadgeHtml +
                        '<div class="dish-icon">🍽️</div>' +
                        '<div class="dish-name">' + dish.name + '</div>';
                }
                dishesGrid.appendChild(dishCard);
            }
        }
